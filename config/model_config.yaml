# 业务模型名称，用于标识当前这套预测任务
model_name: purchase_power

# 训练和预测的目标字段名
target: purchase_power

# 默认训练算法，可选: xgboost / lightgbm / random_forest
algorithm: random_forest

# 模型训练使用的特征列，后续代码可以直接读取该列表构造训练数据
features:
  - weekday
  - month
  - is_weekend
  - total_power
  - self_power
  - steel_output
  - rolling_output
  - temperature
  - is_holiday
  - is_maintenance
  - purchase_lag_1
  - purchase_lag_7
  - purchase_rolling_7

# XGBoost 回归模型参数
xgboost_params:
  n_estimators: 500
  max_depth: 6
  learning_rate: 0.05
  subsample: 0.9
  colsample_bytree: 0.9
  objective: reg:squarederror
  reg_alpha: 0.0
  reg_lambda: 1.0
  random_state: 42
  n_jobs: -1

# LightGBM 回归模型参数
lightgbm_params:
  n_estimators: 500
  learning_rate: 0.05
  num_leaves: 31
  max_depth: -1
  subsample: 0.9
  colsample_bytree: 0.9
  objective: regression
  random_state: 42
  n_jobs: -1

# RandomForest 回归模型参数
random_forest_params:
  n_estimators: 400
  max_depth: 10
  min_samples_leaf: 2
  random_state: 42
  n_jobs: -1

# 模型效果阈值，用于后续验收和上线判断
evaluation:
  # 全量样本最大允许 MAPE，15.0 表示 15%
  max_mape: 15.0
  # 峰值时段最大允许 MAPE，20.0 表示 20%
  max_peak_mape: 20.0
  # 相比上一版 production 模型的最小改进比例，3.0 表示至少提升 3%
  min_improvement_rate: 3.0

# 训练切分方式，time 表示按时间顺序切分
split_strategy: time

# 随机种子，便于结果复现
random_state: 42

# 预测输出字段名
prediction:
  output_column: predicted_purchase_power

# 模型版本管理配置
registry:
  registry_path: model_store/model_registry.json
  model_store_dir: model_store
  candidate_status: candidate
  production_status: production
  archived_status: archived

# 自动调参配置
tuning:
  enabled: false
  default_model: xgboost
  n_trials: 30
  metric: mape
  direction: minimize
  timeout: null
  random_state: 42
  train_final_model: false

  xgboost_search_space:
    n_estimators:
      type: int
      low: 100
      high: 1000
      step: 100
    max_depth:
      type: int
      low: 3
      high: 10
    learning_rate:
      type: float
      low: 0.01
      high: 0.2
      log: true
    subsample:
      type: float
      low: 0.6
      high: 1.0
    colsample_bytree:
      type: float
      low: 0.6
      high: 1.0
    reg_alpha:
      type: float
      low: 0.0
      high: 2.0
    reg_lambda:
      type: float
      low: 0.5
      high: 5.0

  lightgbm_search_space:
    n_estimators:
      type: int
      low: 100
      high: 1000
      step: 100
    learning_rate:
      type: float
      low: 0.01
      high: 0.2
      log: true
    num_leaves:
      type: int
      low: 15
      high: 127
    max_depth:
      type: int
      low: 3
      high: 12
    subsample:
      type: float
      low: 0.6
      high: 1.0
    colsample_bytree:
      type: float
      low: 0.6
      high: 1.0

  random_forest_search_space:
    n_estimators:
      type: int
      low: 100
      high: 800
      step: 100
    max_depth:
      type: int
      low: 3
      high: 20
    min_samples_leaf:
      type: int
      low: 1
      high: 10
    min_samples_split:
      type: int
      low: 2
      high: 20
