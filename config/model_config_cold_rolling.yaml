# Model configuration for Cold Rolling electricity consumption forecasting
model_name: cold_rolling_power_forecast_model
model_description: "Time series forecasting model for Cold Rolling production line electricity consumption"

# Default algorithm to use (can be overridden during training)
default_algorithm: xgboost

# Supported algorithms
supported_algorithms:
  - random_forest
  - xgboost
  - lightgbm

# Algorithm-specific hyperparameters
hyperparameters:
  random_forest:
    n_estimators: 100
    max_depth: 10
    min_samples_split: 2
    min_samples_leaf: 1
    random_state: 42
    n_jobs: -1
  
  xgboost:
    n_estimators: 100
    max_depth: 6
    learning_rate: 0.1
    subsample: 0.8
    colsample_bytree: 0.8
    random_state: 42
    n_jobs: -1
    verbosity: 0
  
  lightgbm:
    n_estimators: 100
    max_depth: 6
    learning_rate: 0.1
    subsample: 0.8
    colsample_bytree: 0.8
    random_state: 42
    n_jobs: -1
    verbosity: -1

# Training configuration
training:
  early_stopping: True
  early_stopping_rounds: 20
  cross_validation: True
  cv_folds: 5
  metric: "mape" # Primary metric for optimization

# Model registry configuration
registry:
  path: models/cold_rolling_registry.json
  artifact_path: models/cold_rolling_artifacts
  auto_promote: False # Whether to automatically promote best model to production

# Prediction configuration
prediction:
  confidence_interval: 0.95
  output_columns:
    - date
    - prediction
    - lower_bound
    - upper_bound
